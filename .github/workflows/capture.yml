name: Capture Frame

on:
  schedule:
    # Triggers every 5 minutes (GitHub's minimum). Capture interval, work days,
    # and work hours are all configured in config.yml — capture.py skips
    # any run that falls outside those settings.
    - cron: '*/5 * * * *'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass work-hours check (useful for testing outside work hours)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache ffmpeg static binary
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg
          key: ffmpeg-static-linux-amd64

      - name: Download ffmpeg static binary
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q -O /tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          mkdir -p /opt/ffmpeg
          tar -xf /tmp/ffmpeg.tar.xz --strip-components=2 -C /opt/ffmpeg --wildcards '*/bin/ffmpeg'
          chmod +x /opt/ffmpeg/ffmpeg

      - name: Add ffmpeg to PATH
        run: echo "/opt/ffmpeg" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Capture and upload frame
        env:
          STREAM_URL: ${{ secrets.STREAM_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: python scripts/capture.py ${{ inputs.force == 'true' && '--force' || '' }}
