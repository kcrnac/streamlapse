name: Generate Timelapse

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Start date (YYYY-MM-DD). Defaults to first day of current month.'
        required: false
        default: ''
      date_to:
        description: 'End date (YYYY-MM-DD). Defaults to today.'
        required: false
        default: ''
      fps:
        description: 'Frames per second for the output video.'
        required: false
        default: '24'
      output:
        description: 'Output filename (e.g. timelapse_april.mp4). Auto-generated if blank.'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # large timelapses with many frames can take a while

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache ffmpeg static binary
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg
          key: ffmpeg-static-linux-amd64

      - name: Download ffmpeg static binary
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q -O /tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          mkdir -p /opt/ffmpeg
          tar -xf /tmp/ffmpeg.tar.xz --strip-components=2 -C /opt/ffmpeg --wildcards '*/bin/ffmpeg'
          chmod +x /opt/ffmpeg/ffmpeg

      - name: Add ffmpeg to PATH
        run: echo "/opt/ffmpeg" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate timelapse
        env:
          STREAM_URL: ${{ secrets.STREAM_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python scripts/generate.py \
            ${{ inputs.date_from != '' && format('--date-from {0}', inputs.date_from) || '' }} \
            ${{ inputs.date_to   != '' && format('--date-to {0}',   inputs.date_to)   || '' }} \
            --fps "${{ inputs.fps }}" \
            ${{ inputs.output    != '' && format('--output {0}',    inputs.output)    || '' }}

      - name: Upload video as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: timelapse
          path: '*.mp4'
          if-no-files-found: warn
